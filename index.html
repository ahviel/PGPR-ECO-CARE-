<!-- Raw JSX source, held as inert text so the browser never tries to parse it directly -->
<script type="text/plain" id="app-source">
const { useState, useMemo, useEffect, useRef } = React;

function IconBase({ paths, size = 24, color = "currentColor", strokeWidth = 2, className, style, opacity }) {
  return (
    <svg
      width={size}
      height={size}
      viewBox="0 0 24 24"
      fill="none"
      stroke={color}
      strokeWidth={strokeWidth}
      strokeLinecap="round"
      strokeLinejoin="round"
      className={className}
      style={style}
      opacity={opacity}
    >
      {paths}
    </svg>
  );
}
const mk = (paths) => (props) => <IconBase {...props} paths={paths} />;

const Hammer = mk(<><rect x="13" y="2" width="5" height="7" rx="1" transform="rotate(45 15.5 5.5)" /><path d="M6 21l6-6" /></>);
const Ruler = mk(<><rect x="3" y="7" width="18" height="10" rx="1" /><path d="M7 7v3" /><path d="M11 7v5" /><path d="M15 7v3" /><path d="M19 7v5" /></>);

const Backpack = mk(<><path d="M8 4h8a2 2 0 0 1 2 2v14H6V6a2 2 0 0 1 2-2z" /><path d="M9 4V2h6v2" /><path d="M8 10h8" /><path d="M9 14h6v6H9z" /></>);
const Shirt = mk(<path d="M8 3 4 6l2 3 2-1v11h8V8l2 1 2-3-4-3-2 2h-4z" />);
const Scissors = mk(<><circle cx="6" cy="6" r="2.5" /><circle cx="6" cy="18" r="2.5" /><line x1="20" y1="4" x2="8.1" y2="15.9" /><line x1="14.5" y1="10.5" x2="20" y2="20" /><line x1="8.1" y1="8.1" x2="10" y2="10" /></>);

const Package = mk(<><path d="M21 8 12 3 3 8v8l9 5 9-5z" /><path d="M3 8l9 5 9-5" /><line x1="12" y1="13" x2="12" y2="21" /></>);
const Box = mk(<><rect x="3" y="7" width="18" height="14" rx="1" /><path d="M3 7l9-4 9 4" /><line x1="12" y1="3" x2="12" y2="21" /></>);
const Tag = mk(<><path d="M20 12 12 20l-9-9V4h7z" /><circle cx="7.5" cy="7.5" r="1" /></>);
const Lightbulb = mk(<><path d="M9 18h6" /><path d="M10 22h4" /><path d="M12 2a7 7 0 0 0-4 12.7c.7.6 1 1.4 1 2.3h6c0-.9.3-1.7 1-2.3A7 7 0 0 0 12 2z" /></>);
const ShoppingCart = mk(<><circle cx="9" cy="20" r="1.3" /><circle cx="18" cy="20" r="1.3" /><path d="M2 3h2l2.4 12.4a2 2 0 0 0 2 1.6h8.6a2 2 0 0 0 2-1.6L21 7H6" /></>);
const X = mk(<><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></>);
const Plus = mk(<><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></>);
const Minus = mk(<line x1="5" y1="12" x2="19" y2="12" />);
const Check = mk(<polyline points="4 12 9 17 20 6" />);
const Upload = mk(<><path d="M12 16V4" /><polyline points="6 10 12 4 18 10" /><path d="M4 20h16" /></>);
const ExternalLink = mk(<><path d="M14 4h6v6" /><path d="M20 4 10 14" /><path d="M8 5H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3" /></>);
const Loader2 = mk(<path d="M21 12a9 9 0 1 1-6.2-8.6" />);
const ImageOff = mk(<><path d="M3 3l18 18" /><path d="M21 15V5a2 2 0 0 0-2-2H8" /><path d="M3 8v11a2 2 0 0 0 2 2h11" /><circle cx="9" cy="9" r="1.5" /></>);
const ShieldCheck = mk(<><path d="M12 2 4 5v6c0 5 3.5 8.5 8 11 4.5-2.5 8-6 8-11V5z" /><polyline points="9 12 11 14 15 10" /></>);
const Lock = mk(<><rect x="5" y="11" width="14" height="9" rx="2" /><path d="M8 11V7a4 4 0 0 1 8 0v4" /></>);
const Pencil = mk(<><path d="M12 20h9" /><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" /></>);
const Trash2 = mk(<><polyline points="3 6 5 6 21 6" /><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" /><path d="M10 11v6" /><path d="M14 11v6" /><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" /></>);
const RefreshCw = mk(<><path d="M21 12a9 9 0 1 1-3-6.7" /><polyline points="21 3 21 9 15 9" /></>);

const INK = "#1F2A44";
const PAPER = "#F0EEE4";
const CARD = "#FBFAF9";
const BRASS = "#A9762F";
const RUST = "#9C4A2E";
const GREEN = "#3E6B4F";

// ---- EDIT THESE TO MATCH YOUR REAL SETUP ----------------------------------
const PAYMENT_URL = "https://your-payment-link.example"; // your PayNow page, bank details page, PayPal.me link, etc.
const PAYMENT_INSTRUCTIONS =
  "Click the button below to open our payment page in a new tab. Complete payment there for the total shown, then come back here and upload a screenshot or PDF of your payment confirmation.";
// This only keeps casual visitors out of the admin view — it lives in this
// file's own code, so anyone who reads the source can find it. Don't rely on
// it for anything you truly need to keep secure.
const ADMIN_PASSCODE = "changeme123";
// ---------------------------------------------------------------------------

const ICONS = {
  hammer: Hammer,
  ruler: Ruler,
  wrench: Wrench,
  compass: Compass,
  coffee: Coffee,
  backpack: Backpack,
  shirt: Shirt,
  scissors: Scissors,
  tent: Tent,
  feather: Feather,
  package: Package,
  box: Box,
  tag: Tag,
  lightbulb: Lightbulb,
};
const FALLBACK_ICON_KEY = "box";

const DEFAULT_CATALOG = [
  { id: "fb-001", name: "Brass Calipers", category: "Hand Tools", price: 48, spec: "6 IN / VERNIER", iconKey: "ruler", desc: "Precision vernier calipers, solid brass, hand-fitted jaws." },
  { id: "fb-002", name: "Cast Iron Bench Vise", category: "Hardware", price: 96, spec: "4 IN JAW / 11 LB", iconKey: "wrench", desc: "Swivel-base vise cast in one pour, machined jaw faces." },
  { id: "fb-003", name: "Oak Mallet", category: "Hand Tools", price: 32, spec: "16 OZ / RED OAK", iconKey: "hammer", desc: "Turned red oak head and handle, no metal fasteners." },
  { id: "fb-004", name: "Waxed Canvas Apron", category: "Workwear", price: 64, spec: "18 OZ / DUCK CLOTH", iconKey: "shirt", desc: "Bib apron in waxed cotton duck, brass rivets, tool pocket." },
  { id: "fb-005", name: "Field Compass", category: "Camp & Field", price: 54, spec: "BRASS / SIGHTING", iconKey: "compass", desc: "Sighting compass with folding lid, luminous bezel." },
  { id: "fb-006", name: "Enamel Camp Mug Set", category: "Camp & Field", price: 28, spec: "SET OF 2 / 12 OZ", iconKey: "coffee", desc: "Chip-resistant enamel over steel, riveted handles." },
  { id: "fb-007", name: "Canvas Tool Roll", category: "Hardware", price: 38, spec: "12 POCKET / 30 IN", iconKey: "backpack", desc: "Roll-up canvas organizer with leather ties, twelve slots." },
  { id: "fb-008", name: "Shears, 8 Inch", category: "Hand Tools", price: 26, spec: "CARBON STEEL", iconKey: "scissors", desc: "Forged carbon steel shears, honed edge, walnut grips." },
  { id: "fb-009", name: "Canvas Field Tent", category: "Camp & Field", price: 210, spec: "2-PERSON / A-FRAME", iconKey: "tent", desc: "Cotton canvas A-frame with hardwood poles, breathable weave." },
  { id: "fb-010", name: "Wool Work Blanket", category: "Workwear", price: 72, spec: "100% WOOL / 50x70", iconKey: "feather", desc: "Heavyweight wool throw, whipstitched edge, cedar-stored." },
];

const MAX_PROOF_BYTES = 3 * 1024 * 1024; // 3MB, comfortably under the 5MB storage limit once base64-encoded

function money(n) {
  return `$${Number(n || 0).toFixed(2)}`;
}
function generateOrderNumber() {
  return `FB-${Math.floor(100000 + Math.random() * 900000)}`;
}
function slugify(name) {
  const base = name.toLowerCase().trim().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
  return `${base || "item"}-${Math.floor(1000 + Math.random() * 9000)}`;
}
function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error("Could not read that file"));
    reader.readAsDataURL(file);
  });
}

const emptyProductForm = { name: "", category: "", price: "", spec: "", desc: "", iconKey: "box" };

function StoreApp() {
  // ---- catalog (shared, persisted) ----
  const [products, setProducts] = useState(DEFAULT_CATALOG);
  const [productsLoading, setProductsLoading] = useState(true);
  const [productsError, setProductsError] = useState(null);
  const [storageAvailable, setStorageAvailable] = useState(true);

  const [category, setCategory] = useState("All");
  const [cart, setCart] = useState({});
  const [cartOpen, setCartOpen] = useState(false);

  // ---- checkout ----
  const [checkoutOpen, setCheckoutOpen] = useState(false);
  const [checkoutStep, setCheckoutStep] = useState("details");
  const [form, setForm] = useState({ name: "", email: "" });
  const [proofFile, setProofFile] = useState(null);
  const [proofError, setProofError] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState(null);
  const [receipt, setReceipt] = useState(null);
  const [visitedPayment, setVisitedPayment] = useState(false);

  // ---- admin ----
  const [isAdmin, setIsAdmin] = useState(false);
  const [adminOpen, setAdminOpen] = useState(false);
  const [adminTab, setAdminTab] = useState("orders");
  const [passcodeOpen, setPasscodeOpen] = useState(false);
  const [passcodeInput, setPasscodeInput] = useState("");
  const [passcodeError, setPasscodeError] = useState(null);

  const [orders, setOrders] = useState([]);
  const [ordersLoading, setOrdersLoading] = useState(false);
  const [ordersError, setOrdersError] = useState(null);
  const [lightboxProof, setLightboxProof] = useState(null);

  const [editingProduct, setEditingProduct] = useState(null); // null = not editing, {} = adding new, {...} = editing existing
  const [productForm, setProductForm] = useState(emptyProductForm);
  const [catalogSaving, setCatalogSaving] = useState(false);
  const [catalogError, setCatalogError] = useState(null);

  // Load the catalog once on mount.
  useEffect(() => {
    let cancelled = false;
    async function loadCatalog() {
      setProductsLoading(true);
      setProductsError(null);
      if (!window.storage) {
        setStorageAvailable(false);
        setProducts(DEFAULT_CATALOG);
        setProductsLoading(false);
        return;
      }
      try {
        const result = await window.storage.get("catalog", true).catch(() => null);
        if (cancelled) return;
        if (result) {
          setProducts(JSON.parse(result.value));
        } else {
          // First time this artifact has run — seed shared storage with the default catalog.
          await window.storage.set("catalog", JSON.stringify(DEFAULT_CATALOG), true);
          setProducts(DEFAULT_CATALOG);
        }
      } catch (err) {
        if (!cancelled) setProductsError("Could not load the catalog. Showing the default set instead.");
      } finally {
        if (!cancelled) setProductsLoading(false);
      }
    }
    loadCatalog();
    return () => {
      cancelled = true;
    };
  }, []);

  const categories = useMemo(() => ["All", ...Array.from(new Set(products.map((p) => p.category)))], [products]);

  const items = useMemo(
    () => (category === "All" ? products : products.filter((p) => p.category === category)),
    [category, products]
  );

  const cartLines = useMemo(
    () =>
      Object.entries(cart)
        .filter(([, qty]) => qty > 0)
        .map(([id, qty]) => ({ ...products.find((p) => p.id === id), qty }))
        .filter((line) => line.id),
    [cart, products]
  );

  const subtotal = cartLines.reduce((s, l) => s + l.price * l.qty, 0);
  const tax = subtotal * 0.07;
  const total = subtotal + tax;
  const cartCount = cartLines.reduce((s, l) => s + l.qty, 0);

  function addItem(id) {
    setCart((c) => ({ ...c, [id]: (c[id] || 0) + 1 }));
  }
  function setQty(id, qty) {
    setCart((c) => ({ ...c, [id]: Math.max(0, qty) }));
  }

  function openCheckout() {
    setCartOpen(false);
    setCheckoutOpen(true);
    setCheckoutStep("details");
    setSubmitError(null);
  }
  function goToPaymentStep(e) {
    e.preventDefault();
    if (!form.name || !form.email) return;
    setCheckoutStep("payment");
  }
  function openPaymentSite() {
    window.open(PAYMENT_URL, "_blank", "noopener,noreferrer");
    setVisitedPayment(true);
  }

  async function handleFileChange(e) {
    const file = e.target.files && e.target.files[0];
    setProofError(null);
    if (!file) return;
    if (file.size > MAX_PROOF_BYTES) {
      setProofError("That file is too large — please upload something under 3MB (a screenshot works well).");
      return;
    }
    if (!/^image\/|^application\/pdf$/.test(file.type)) {
      setProofError("Please upload an image (screenshot) or a PDF of your payment confirmation.");
      return;
    }
    try {
      const dataUrl = await fileToDataUrl(file);
      setProofFile({ dataUrl, name: file.name, type: file.type });
    } catch (err) {
      setProofError(err.message || "Could not read that file.");
    }
  }

  async function submitOrder(e) {
    e.preventDefault();
    if (!proofFile) {
      setProofError("Please upload proof of payment before submitting.");
      return;
    }
    setSubmitting(true);
    setSubmitError(null);

    const orderNumber = generateOrderNumber();
    const orderRecord = {
      orderNumber,
      name: form.name,
      email: form.email,
      items: cartLines.map((l) => ({ id: l.id, name: l.name, price: l.price, qty: l.qty })),
      subtotal,
      tax,
      total,
      proof: { dataUrl: proofFile.dataUrl, name: proofFile.name, type: proofFile.type },
      status: "pending",
      submittedAt: new Date().toISOString(),
    };

    try {
      if (window.storage) {
        await window.storage.set(`order:${orderNumber}`, JSON.stringify(orderRecord), true);
      }
      setReceipt(orderRecord);
      setCheckoutStep("receipt");
      setCart({});
      setProofFile(null);
      setForm({ name: "", email: "" });
    } catch (err) {
      setSubmitError("Could not save your order. Please try again.");
    } finally {
      setSubmitting(false);
    }
  }

  function closeCheckout() {
    setCheckoutOpen(false);
    setCheckoutStep("details");
    setReceipt(null);
    setProofFile(null);
    setProofError(null);
    setVisitedPayment(false);
  }

  // ---- admin: passcode gate ----
  function submitPasscode(e) {
    e.preventDefault();
    if (passcodeInput === ADMIN_PASSCODE) {
      setIsAdmin(true);
      setPasscodeOpen(false);
      setAdminOpen(true);
      setPasscodeInput("");
      setPasscodeError(null);
    } else {
      setPasscodeError("Incorrect passcode.");
    }
  }

  // ---- admin: orders ----
  async function loadOrders() {
    if (!window.storage) {
      setOrdersError("Storage isn't available in this preview, so there are no saved orders to show here.");
      return;
    }
    setOrdersLoading(true);
    setOrdersError(null);
    try {
      const listing = await window.storage.list("order:", true);
      const keys = listing && listing.keys ? listing.keys : [];
      const loaded = [];
      for (const key of keys) {
        try {
          const result = await window.storage.get(key, true);
          if (result) loaded.push(JSON.parse(result.value));
        } catch {
          // skip unreadable entries
        }
      }
      loaded.sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt));
      setOrders(loaded);
    } catch (err) {
      setOrdersError("Could not load orders.");
    } finally {
      setOrdersLoading(false);
    }
  }

  useEffect(() => {
    if (adminOpen && adminTab === "orders") loadOrders();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [adminOpen, adminTab]);

  async function setOrderStatus(orderNumber, status) {
    const order = orders.find((o) => o.orderNumber === orderNumber);
    if (!order) return;
    const updated = { ...order, status };
    setOrders((list) => list.map((o) => (o.orderNumber === orderNumber ? updated : o)));
    try {
      await window.storage.set(`order:${orderNumber}`, JSON.stringify(updated), true);
    } catch {
      setOrdersError("Could not save that status change — it may revert on refresh.");
    }
  }

  // ---- admin: catalog editing ----
  async function saveCatalog(nextProducts) {
    setCatalogSaving(true);
    setCatalogError(null);
    try {
      if (window.storage) {
        await window.storage.set("catalog", JSON.stringify(nextProducts), true);
      }
      setProducts(nextProducts);
    } catch (err) {
      setCatalogError("Could not save catalog changes. Please try again.");
    } finally {
      setCatalogSaving(false);
    }
  }

  function startAddProduct() {
    setEditingProduct({});
    setProductForm(emptyProductForm);
    setCatalogError(null);
  }
  function startEditProduct(p) {
    setEditingProduct(p);
    setProductForm({
      name: p.name,
      category: p.category,
      price: String(p.price),
      spec: p.spec || "",
      desc: p.desc || "",
      iconKey: p.iconKey || FALLBACK_ICON_KEY,
    });
    setCatalogError(null);
  }
  function cancelEditProduct() {
    setEditingProduct(null);
    setProductForm(emptyProductForm);
    setCatalogError(null);
  }

  async function submitProductForm(e) {
    e.preventDefault();
    const price = parseFloat(productForm.price);
    if (!productForm.name || !productForm.category || Number.isNaN(price)) {
      setCatalogError("Name, category, and a valid price are required.");
      return;
    }
    const isNew = !editingProduct || !editingProduct.id;
    const productRecord = {
      id: isNew ? slugify(productForm.name) : editingProduct.id,
      name: productForm.name,
      category: productForm.category,
      price,
      spec: productForm.spec,
      desc: productForm.desc,
      iconKey: productForm.iconKey,
    };
    const next = isNew
      ? [...products, productRecord]
      : products.map((p) => (p.id === productRecord.id ? productRecord : p));
    await saveCatalog(next);
    if (!catalogError) {
      setEditingProduct(null);
      setProductForm(emptyProductForm);
    }
  }

  async function deleteProduct(id) {
    const next = products.filter((p) => p.id !== id);
    await saveCatalog(next);
  }

  return (
    <div
      style={{
        background: PAPER,
        color: INK,
        minHeight: "100%",
        fontFamily: "'Inter', sans-serif",
        backgroundImage:
          "linear-gradient(rgba(31,42,68,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(31,42,68,0.05) 1px, transparent 1px)",
        backgroundSize: "28px 28px",
      }}
    >
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
        .fb-display { font-family: 'Fraunces', serif; }
        .fb-mono { font-family: 'IBM Plex Mono', monospace; }
        .fb-card { position: relative; }
        .fb-corner { position: absolute; width: 14px; height: 14px; border-color: ${INK}; opacity: 0.55; }
        .fb-corner.tl { top: 8px; left: 8px; border-top: 2px solid; border-left: 2px solid; }
        .fb-corner.tr { top: 8px; right: 8px; border-top: 2px solid; border-right: 2px solid; }
        .fb-corner.bl { bottom: 8px; left: 8px; border-bottom: 2px solid; border-left: 2px solid; }
        .fb-corner.br { bottom: 8px; right: 8px; border-bottom: 2px solid; border-right: 2px solid; }
        .fb-btn { transition: transform 0.1s ease, background 0.15s ease; }
        .fb-btn:active { transform: translateY(1px); }
        .fb-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .fb-input { width: 100%; padding: 8px 12px; font-size: 14px; border: 1px solid ${INK}; background: ${PAPER}; }
      `}</style>

      {/* Header */}
      <header
        style={{ borderBottom: `2px solid ${INK}` }}
        className="sticky top-0 z-20 px-5 md:px-10 py-4 flex items-center justify-between"
      >
        <div className="flex items-center gap-3">
          <div
            style={{ background: INK, color: PAPER, width: 40, height: 40 }}
            className="fb-mono flex items-center justify-center text-sm font-medium"
          >
            F&B
          </div>
          <div>
            <div className="fb-display text-xl leading-none" style={{ fontWeight: 600 }}>
              Field &amp; Bench
            </div>
            <div className="fb-mono text-[10px] tracking-widest opacity-60">WORKSHOP SUPPLY CO.</div>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <button
            onClick={() => (isAdmin ? setAdminOpen(true) : setPasscodeOpen(true))}
            className="fb-btn flex items-center gap-2 px-3 py-2"
            style={{ border: `1.5px solid ${INK}` }}
            title="Admin"
          >
            <Lock size={16} />
          </button>
          <button
            onClick={() => setCartOpen(true)}
            className="fb-btn flex items-center gap-2 px-3 py-2"
            style={{ border: `1.5px solid ${INK}` }}
          >
            <ShoppingCart size={18} />
            <span className="fb-mono text-xs">{String(cartCount).padStart(2, "0")}</span>
          </button>
        </div>
      </header>

      {/* Hero */}
      <section className="px-5 md:px-10 pt-10 pb-8" style={{ borderBottom: `1px solid rgba(31,42,68,0.25)` }}>
        <div className="fb-mono text-xs tracking-widest opacity-60 mb-2">SUPPLY SHEET NO. 04 — SUMMER STOCK</div>
        <h1 className="fb-display" style={{ fontSize: "clamp(2rem, 5vw, 3.25rem)", fontWeight: 600, maxWidth: 720, lineHeight: 1.05 }}>
          Tools that outlast the job, stocked to order.
        </h1>
        <p className="mt-3 max-w-md text-sm opacity-80">
          Payment is by bank transfer / PayNow — you'll upload your payment confirmation before your receipt is issued.
        </p>
        {!storageAvailable && (
          <p className="fb-mono text-[10px] mt-3 max-w-md" style={{ color: RUST }}>
            Storage isn't available in this preview — the catalog and any orders here won't be saved. Publish the
            artifact to enable persistence.
          </p>
        )}
      </section>

      {/* Category tabs */}
      <nav className="px-5 md:px-10 py-4 flex flex-wrap gap-2" style={{ borderBottom: `1px solid rgba(31,42,68,0.25)` }}>
        {categories.map((c) => (
          <button
            key={c}
            onClick={() => setCategory(c)}
            className="fb-mono text-xs px-3 py-1.5"
            style={{
              border: `1px solid ${INK}`,
              background: category === c ? INK : "transparent",
              color: category === c ? PAPER : INK,
            }}
          >
            {c.toUpperCase()}
          </button>
        ))}
      </nav>

      {/* Catalog grid */}
      {productsLoading ? (
        <div className="px-5 md:px-10 py-16 flex flex-col items-center gap-2 opacity-70">
          <Loader2 size={22} className="animate-spin" />
          <div className="fb-mono text-xs tracking-widest">LOADING SUPPLY SHEET…</div>
        </div>
      ) : (
        <section className="px-5 md:px-10 py-8 grid gap-6" style={{ gridTemplateColumns: "repeat(auto-fill, minmax(230px, 1fr))" }}>
          {productsError && (
            <div className="col-span-full fb-mono text-xs" style={{ color: RUST }}>
              {productsError}
            </div>
          )}
          {items.map((p) => {
            const Icon = ICONS[p.iconKey] || ICONS[FALLBACK_ICON_KEY];
            return (
              <div key={p.id} className="fb-card p-5 flex flex-col" style={{ background: CARD, border: `1px solid rgba(31,42,68,0.35)` }}>
                <span className="fb-corner tl" />
                <span className="fb-corner tr" />
                <span className="fb-corner bl" />
                <span className="fb-corner br" />
                <div className="fb-mono text-[10px] tracking-widest opacity-50 mb-3">{p.id.toUpperCase()}</div>
                <div className="flex items-center justify-center mb-4" style={{ height: 96, border: `1px dashed rgba(31,42,68,0.3)`, background: PAPER }}>
                  <Icon size={34} color={BRASS} strokeWidth={1.5} />
                </div>
                <div className="fb-display text-base" style={{ fontWeight: 600 }}>{p.name}</div>
                <div className="fb-mono text-[10px] tracking-wide opacity-55 mt-1">{p.spec}</div>
                <p className="text-xs opacity-75 mt-2 flex-grow">{p.desc}</p>
                <div className="flex items-center justify-between mt-4 pt-3" style={{ borderTop: `1px dashed rgba(31,42,68,0.3)` }}>
                  <span className="fb-mono text-sm" style={{ color: RUST }}>{money(p.price)}</span>
                  <button onClick={() => addItem(p.id)} className="fb-btn fb-mono text-xs px-3 py-1.5" style={{ background: INK, color: PAPER }}>
                    ADD
                  </button>
                </div>
              </div>
            );
          })}
        </section>
      )}

      {/* Cart drawer */}
      {cartOpen && (
        <div className="fixed inset-0 z-30 flex justify-end" style={{ background: "rgba(31,42,68,0.35)" }} onClick={() => setCartOpen(false)}>
          <div onClick={(e) => e.stopPropagation()} className="h-full w-full max-w-sm flex flex-col" style={{ background: PAPER, borderLeft: `2px solid ${INK}` }}>
            <div className="flex items-center justify-between px-5 py-4" style={{ borderBottom: `1px solid ${INK}` }}>
              <div className="fb-mono text-xs tracking-widest">ORDER TICKET</div>
              <button onClick={() => setCartOpen(false)}><X size={18} /></button>
            </div>
            <div className="flex-grow overflow-y-auto px-5 py-4">
              {cartLines.length === 0 && <div className="fb-mono text-xs opacity-60 mt-8 text-center">TICKET EMPTY — ADD ITEMS FROM SHEET</div>}
              {cartLines.map((l) => (
                <div key={l.id} className="flex items-center justify-between py-3" style={{ borderBottom: `1px dashed rgba(31,42,68,0.3)` }}>
                  <div>
                    <div className="text-sm font-medium">{l.name}</div>
                    <div className="fb-mono text-[10px] opacity-55">{money(l.price)} EACH</div>
                  </div>
                  <div className="flex items-center gap-2">
                    <button onClick={() => setQty(l.id, l.qty - 1)} style={{ border: `1px solid ${INK}` }} className="p-1"><Minus size={12} /></button>
                    <span className="fb-mono text-xs w-4 text-center">{l.qty}</span>
                    <button onClick={() => setQty(l.id, l.qty + 1)} style={{ border: `1px solid ${INK}` }} className="p-1"><Plus size={12} /></button>
                  </div>
                </div>
              ))}
            </div>
            {cartLines.length > 0 && (
              <div className="px-5 py-4" style={{ borderTop: `2px solid ${INK}` }}>
                <div className="flex justify-between fb-mono text-xs mb-1 opacity-70"><span>SUBTOTAL</span><span>{money(subtotal)}</span></div>
                <div className="flex justify-between fb-mono text-xs mb-2 opacity-70"><span>TAX (7%)</span><span>{money(tax)}</span></div>
                <div className="flex justify-between fb-mono text-sm font-medium mb-4"><span>TOTAL</span><span>{money(total)}</span></div>
                <button onClick={openCheckout} className="fb-btn w-full py-2.5 fb-mono text-xs tracking-widest" style={{ background: INK, color: PAPER }}>
                  PROCEED TO CHECKOUT
                </button>
              </div>
            )}
          </div>
        </div>
      )}

      {/* Checkout flow */}
      {checkoutOpen && (
        <div className="fixed inset-0 z-40 flex items-center justify-center p-4" style={{ background: "rgba(31,42,68,0.45)" }}>
          <div className="w-full max-w-sm p-6" style={{ background: CARD, border: `2px solid ${INK}`, maxHeight: "90vh", overflowY: "auto" }}>
            <div className="flex items-center justify-between mb-4">
              <div className="fb-mono text-[10px] tracking-widest opacity-60">
                STEP {checkoutStep === "details" ? "1" : checkoutStep === "payment" ? "2" : "3"} OF 3
              </div>
              <button type="button" onClick={closeCheckout}><X size={16} /></button>
            </div>

            {checkoutStep === "details" && (
              <form onSubmit={goToPaymentStep}>
                <div className="fb-display text-lg mb-4" style={{ fontWeight: 600 }}>Your Details</div>
                {["name", "email"].map((field) => (
                  <div key={field} className="mb-3">
                    <label className="fb-mono text-[10px] tracking-widest opacity-60 block mb-1">{field.toUpperCase()}</label>
                    <input
                      required
                      type={field === "email" ? "email" : "text"}
                      value={form[field]}
                      onChange={(e) => setForm((f) => ({ ...f, [field]: e.target.value }))}
                      className="fb-input"
                    />
                  </div>
                ))}
                <div className="flex justify-between fb-mono text-sm font-medium my-4"><span>TOTAL DUE</span><span>{money(total)}</span></div>
                <button type="submit" className="fb-btn w-full py-2.5 fb-mono text-xs tracking-widest" style={{ background: INK, color: PAPER }}>
                  CONTINUE TO PAYMENT
                </button>
              </form>
            )}

            {checkoutStep === "payment" && (
              <form onSubmit={submitOrder}>
                <div className="fb-display text-lg mb-2" style={{ fontWeight: 600 }}>Complete Payment</div>
                <p className="text-xs opacity-75 mb-4">{PAYMENT_INSTRUCTIONS}</p>
                <div className="flex justify-between fb-mono text-sm font-medium mb-4 pb-3" style={{ borderBottom: `1px dashed rgba(31,42,68,0.3)` }}>
                  <span>AMOUNT TO PAY</span><span style={{ color: RUST }}>{money(total)}</span>
                </div>
                <button type="button" onClick={openPaymentSite} className="fb-btn w-full py-2.5 fb-mono text-xs tracking-widest flex items-center justify-center gap-2 mb-4" style={{ background: BRASS, color: PAPER }}>
                  <ExternalLink size={14} /> OPEN PAYMENT PAGE
                </button>
                <label className="fb-mono text-[10px] tracking-widest opacity-60 block mb-2">
                  UPLOAD PROOF OF PAYMENT {visitedPayment ? "" : "(after paying)"}
                </label>
                <input type="file" accept="image/*,application/pdf" onChange={handleFileChange} className="hidden" id="proof-upload" />
                <label htmlFor="proof-upload" className="fb-btn flex items-center justify-center gap-2 py-4 mb-2 cursor-pointer text-xs fb-mono" style={{ border: `1.5px dashed ${INK}`, background: PAPER }}>
                  <Upload size={16} /> {proofFile ? "CHOOSE A DIFFERENT FILE" : "CHOOSE SCREENSHOT OR PDF"}
                </label>
                {proofFile && (
                  <div className="flex items-center gap-3 mb-3 p-2" style={{ border: `1px solid rgba(31,42,68,0.3)` }}>
                    {proofFile.type.startsWith("image/") ? (
                      <img src={proofFile.dataUrl} alt="Payment proof preview" style={{ width: 44, height: 44, objectFit: "cover" }} />
                    ) : (
                      <div style={{ width: 44, height: 44 }} className="flex items-center justify-center"><ImageOff size={20} opacity={0.5} /></div>
                    )}
                    <span className="text-xs truncate">{proofFile.name}</span>
                  </div>
                )}
                {proofError && <p className="fb-mono text-[10px] mb-3" style={{ color: RUST }}>{proofError}</p>}
                <button type="submit" disabled={!proofFile || submitting} className="fb-btn w-full py-2.5 fb-mono text-xs tracking-widest flex items-center justify-center gap-2" style={{ background: RUST, color: PAPER }}>
                  {submitting && <Loader2 size={14} className="animate-spin" />}
                  {submitting ? "SUBMITTING…" : "SUBMIT ORDER & GET RECEIPT"}
                </button>
                {submitError && <p className="fb-mono text-[10px] mt-3 text-center" style={{ color: RUST }}>{submitError}</p>}
                <p className="text-[10px] opacity-50 mt-3 text-center">Your receipt is issued as soon as you submit — payment is confirmed manually afterward.</p>
              </form>
            )}

            {checkoutStep === "receipt" && receipt && (
              <div>
                <div className="flex items-center gap-2 mb-4">
                  <div style={{ background: INK, color: PAPER }} className="p-1.5"><Check size={16} /></div>
                  <div className="fb-mono text-xs tracking-widest">ORDER RECEIVED</div>
                </div>
                <div className="fb-display text-lg mb-1" style={{ fontWeight: 600 }}>#{receipt.orderNumber}</div>
                <div className="text-xs opacity-70 mb-4">Thanks, {receipt.name}. Keep this order number — it's how we'll confirm your payment.</div>
                <div className="flex items-center gap-2 mb-4 p-2" style={{ background: PAPER, border: `1px dashed rgba(31,42,68,0.3)` }}>
                  <ShieldCheck size={16} color={BRASS} />
                  <span className="fb-mono text-[10px] tracking-wide">STATUS: PENDING VERIFICATION</span>
                </div>
                <div className="mb-4">
                  {receipt.items.map((l) => (
                    <div key={l.id} className="flex justify-between fb-mono text-xs py-1 opacity-80">
                      <span>{l.qty}× {l.name}</span><span>{money(l.price * l.qty)}</span>
                    </div>
                  ))}
                </div>
                <div className="flex justify-between fb-mono text-sm font-medium mb-4" style={{ borderTop: `1px dashed rgba(31,42,68,0.3)`, paddingTop: 12 }}>
                  <span>TOTAL PAID</span><span>{money(receipt.total)}</span>
                </div>
                <button onClick={closeCheckout} className="fb-btn w-full py-2.5 fb-mono text-xs tracking-widest" style={{ background: INK, color: PAPER }}>
                  CONTINUE SHOPPING
                </button>
              </div>
            )}
          </div>
        </div>
      )}

      {/* Admin passcode modal */}
      {passcodeOpen && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: "rgba(31,42,68,0.45)" }}>
          <form onSubmit={submitPasscode} className="w-full max-w-xs p-6" style={{ background: CARD, border: `2px solid ${INK}` }}>
            <div className="flex items-center justify-between mb-4">
              <div className="fb-mono text-xs tracking-widest">ADMIN ACCESS</div>
              <button type="button" onClick={() => setPasscodeOpen(false)}><X size={16} /></button>
            </div>
            <input
              autoFocus
              type="password"
              value={passcodeInput}
              onChange={(e) => setPasscodeInput(e.target.value)}
              className="fb-input mb-3"
              placeholder="Passcode"
            />
            {passcodeError && <p className="fb-mono text-[10px] mb-3" style={{ color: RUST }}>{passcodeError}</p>}
            <button type="submit" className="fb-btn w-full py-2.5 fb-mono text-xs tracking-widest" style={{ background: INK, color: PAPER }}>
              ENTER
            </button>
          </form>
        </div>
      )}

      {/* Admin panel */}
      {adminOpen && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: "rgba(31,42,68,0.5)" }}>
          <div className="w-full max-w-2xl p-6" style={{ background: CARD, border: `2px solid ${INK}`, maxHeight: "88vh", overflowY: "auto" }}>
            <div className="flex items-center justify-between mb-4">
              <div className="fb-display text-lg" style={{ fontWeight: 600 }}>Admin</div>
              <button onClick={() => setAdminOpen(false)}><X size={18} /></button>
            </div>

            <div className="flex gap-2 mb-5">
              {["orders", "catalog"].map((tab) => (
                <button
                  key={tab}
                  onClick={() => setAdminTab(tab)}
                  className="fb-mono text-xs px-3 py-1.5"
                  style={{ border: `1px solid ${INK}`, background: adminTab === tab ? INK : "transparent", color: adminTab === tab ? PAPER : INK }}
                >
                  {tab.toUpperCase()}
                </button>
              ))}
              {adminTab === "orders" && (
                <button onClick={loadOrders} className="fb-mono text-xs px-3 py-1.5 flex items-center gap-1 ml-auto" style={{ border: `1px solid ${INK}` }}>
                  <RefreshCw size={12} /> REFRESH
                </button>
              )}
            </div>

            {/* Orders tab */}
            {adminTab === "orders" && (
              <div>
                {ordersLoading && (
                  <div className="flex items-center gap-2 fb-mono text-xs opacity-60 py-6 justify-center">
                    <Loader2 size={16} className="animate-spin" /> LOADING ORDERS…
                  </div>
                )}
                {ordersError && <p className="fb-mono text-xs mb-3" style={{ color: RUST }}>{ordersError}</p>}
                {!ordersLoading && !ordersError && orders.length === 0 && (
                  <p className="fb-mono text-xs opacity-60 text-center py-6">NO ORDERS YET</p>
                )}
                {orders.map((o) => (
                  <div key={o.orderNumber} className="mb-3 p-4" style={{ border: `1px solid rgba(31,42,68,0.3)` }}>
                    <div className="flex items-center justify-between mb-2">
                      <div className="fb-mono text-sm font-medium">#{o.orderNumber}</div>
                      <span
                        className="fb-mono text-[10px] px-2 py-1"
                        style={{
                          background: o.status === "verified" ? GREEN : o.status === "rejected" ? RUST : BRASS,
                          color: PAPER,
                        }}
                      >
                        {o.status.toUpperCase()}
                      </span>
                    </div>
                    <div className="text-xs opacity-75 mb-2">
                      {o.name} — {o.email} — {new Date(o.submittedAt).toLocaleString()}
                    </div>
                    <div className="mb-3">
                      {o.items.map((l) => (
                        <div key={l.id} className="flex justify-between fb-mono text-xs py-0.5 opacity-80">
                          <span>{l.qty}× {l.name}</span><span>{money(l.price * l.qty)}</span>
                        </div>
                      ))}
                    </div>
                    <div className="flex items-center justify-between">
                      <div className="fb-mono text-sm font-medium">{money(o.total)}</div>
                      {o.proof && (
                        <button
                          onClick={() => setLightboxProof(o.proof)}
                          className="fb-mono text-[10px] px-2 py-1 underline"
                        >
                          VIEW PROOF
                        </button>
                      )}
                    </div>
                    <div className="flex gap-2 mt-3">
                      <button onClick={() => setOrderStatus(o.orderNumber, "verified")} className="fb-mono text-[10px] px-2 py-1" style={{ background: GREEN, color: PAPER }}>
                        MARK VERIFIED
                      </button>
                      <button onClick={() => setOrderStatus(o.orderNumber, "pending")} className="fb-mono text-[10px] px-2 py-1" style={{ border: `1px solid ${INK}` }}>
                        MARK PENDING
                      </button>
                      <button onClick={() => setOrderStatus(o.orderNumber, "rejected")} className="fb-mono text-[10px] px-2 py-1" style={{ background: RUST, color: PAPER }}>
                        REJECT
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Catalog tab */}
            {adminTab === "catalog" && (
              <div>
                {catalogError && <p className="fb-mono text-xs mb-3" style={{ color: RUST }}>{catalogError}</p>}

                {editingProduct === null && (
                  <button onClick={startAddProduct} className="fb-btn fb-mono text-xs px-3 py-2 mb-4" style={{ background: INK, color: PAPER }}>
                    + ADD PRODUCT
                  </button>
                )}

                {editingProduct !== null && (
                  <form onSubmit={submitProductForm} className="mb-5 p-4" style={{ border: `1px solid rgba(31,42,68,0.3)` }}>
                    <div className="fb-mono text-xs tracking-widest opacity-60 mb-3">
                      {editingProduct && editingProduct.id ? "EDIT PRODUCT" : "NEW PRODUCT"}
                    </div>
                    <div className="grid grid-cols-2 gap-3 mb-3">
                      <input placeholder="Name" value={productForm.name} onChange={(e) => setProductForm((f) => ({ ...f, name: e.target.value }))} className="fb-input" />
                      <input placeholder="Category" value={productForm.category} onChange={(e) => setProductForm((f) => ({ ...f, category: e.target.value }))} className="fb-input" />
                      <input placeholder="Price" type="number" step="0.01" value={productForm.price} onChange={(e) => setProductForm((f) => ({ ...f, price: e.target.value }))} className="fb-input" />
                      <input placeholder="Spec (e.g. 6 IN / VERNIER)" value={productForm.spec} onChange={(e) => setProductForm((f) => ({ ...f, spec: e.target.value }))} className="fb-input" />
                    </div>
                    <textarea placeholder="Description" value={productForm.desc} onChange={(e) => setProductForm((f) => ({ ...f, desc: e.target.value }))} className="fb-input mb-3" rows={2} />
                    <div className="fb-mono text-[10px] tracking-widest opacity-60 mb-2">ICON</div>
                    <div className="flex flex-wrap gap-2 mb-4">
                      {Object.entries(ICONS).map(([key, Icon]) => (
                        <button
                          type="button"
                          key={key}
                          onClick={() => setProductForm((f) => ({ ...f, iconKey: key }))}
                          className="p-2"
                          style={{ border: `1.5px solid ${INK}`, background: productForm.iconKey === key ? INK : PAPER }}
                        >
                          <Icon size={16} color={productForm.iconKey === key ? PAPER : INK} />
                        </button>
                      ))}
                    </div>
                    <div className="flex gap-2">
                      <button type="submit" disabled={catalogSaving} className="fb-btn fb-mono text-xs px-3 py-2 flex items-center gap-2" style={{ background: INK, color: PAPER }}>
                        {catalogSaving && <Loader2 size={12} className="animate-spin" />} SAVE
                      </button>
                      <button type="button" onClick={cancelEditProduct} className="fb-mono text-xs px-3 py-2" style={{ border: `1px solid ${INK}` }}>
                        CANCEL
                      </button>
                    </div>
                  </form>
                )}

                {products.map((p) => {
                  const Icon = ICONS[p.iconKey] || ICONS[FALLBACK_ICON_KEY];
                  return (
                    <div key={p.id} className="flex items-center justify-between py-2" style={{ borderBottom: `1px dashed rgba(31,42,68,0.3)` }}>
                      <div className="flex items-center gap-3">
                        <Icon size={16} color={BRASS} />
                        <div>
                          <div className="text-sm">{p.name}</div>
                          <div className="fb-mono text-[10px] opacity-55">{p.category} · {money(p.price)}</div>
                        </div>
                      </div>
                      <div className="flex gap-2">
                        <button onClick={() => startEditProduct(p)} className="p-1.5" style={{ border: `1px solid ${INK}` }}><Pencil size={12} /></button>
                        <button onClick={() => deleteProduct(p.id)} className="p-1.5" style={{ border: `1px solid ${RUST}`, color: RUST }}><Trash2 size={12} /></button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}

      {/* Proof lightbox */}
      {lightboxProof && (
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4" style={{ background: "rgba(31,42,68,0.8)" }} onClick={() => setLightboxProof(null)}>
          {lightboxProof.type.startsWith("image/") ? (
            <img src={lightboxProof.dataUrl} alt="Payment proof" style={{ maxWidth: "90%", maxHeight: "90%", objectFit: "contain" }} />
          ) : (
            <a href={lightboxProof.dataUrl} download={lightboxProof.name} className="fb-mono text-sm underline" style={{ color: PAPER }} onClick={(e) => e.stopPropagation()}>
              Download {lightboxProof.name}
            </a>
          )}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<StoreApp />);
</script>

<script>
  (function () {
    var src = document.getElementById('app-source').textContent;
    var result = Babel.transform(src, { presets: ['react'] });
    var runner = document.createElement('script');
    runner.textContent = result.code;
    document.body.appendChild(runner);
  })();
</script>
